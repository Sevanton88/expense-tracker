<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spend — Expense Tracker</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Header ── -->
  <header class="header">
    <div class="header-top">
      <div class="app-title">Spend</div>
      <button class="icon-btn" id="add-btn" title="Add transaction">
        <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
          <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
      </button>
    </div>

    <!-- Balance hero -->
    <div class="balance-hero">
      <div class="balance-label">Total Spent</div>
      <div class="balance-amount" id="total-spent">$0.00</div>
    </div>

    <!-- Summary pills -->
    <div class="summary-pills">
      <div class="pill pill-income">
        <span class="pill-icon">↑</span>
        <div>
          <div class="pill-label">Income</div>
          <div class="pill-val" id="total-income">$0.00</div>
        </div>
      </div>
      <div class="pill pill-expense">
        <span class="pill-icon">↓</span>
        <div>
          <div class="pill-label">Expenses</div>
          <div class="pill-val" id="total-expenses">$0.00</div>
        </div>
      </div>
    </div>
  </header>

  <main class="main">

    <!-- ── Chart Section ── -->
    <section class="section">
      <div class="section-header">
        <span class="section-title">Breakdown</span>
        <div class="filter-tabs" id="filter-tabs">
          <button class="tab active" data-filter="all">All</button>
          <button class="tab" data-filter="Food">Food</button>
          <button class="tab" data-filter="Transport">Transport</button>
          <button class="tab" data-filter="Shopping">Shopping</button>
          <button class="tab" data-filter="Health">Health</button>
          <button class="tab" data-filter="Entertainment">Fun</button>
          <button class="tab" data-filter="Income">Income</button>
          <button class="tab" data-filter="Other">Other</button>
        </div>
      </div>
      <div class="chart-card">
        <canvas id="spend-chart" height="200"></canvas>
      </div>
    </section>

    <!-- ── Category Rings ── -->
    <section class="section">
      <div class="section-title">By Category</div>
      <div class="category-grid" id="category-grid"></div>
    </section>

    <!-- ── Transactions ── -->
    <section class="section">
      <div class="section-header">
        <span class="section-title">Transactions</span>
        <button class="text-btn danger" id="clear-all-btn">Clear all</button>
      </div>
      <div class="tx-list" id="tx-list">
        <div class="empty-state" id="empty-state">
          <div class="empty-icon">💸</div>
          <div class="empty-text">No transactions yet</div>
          <div class="empty-sub">Tap + to add your first entry</div>
        </div>
      </div>
    </section>

  </main>

  <footer class="footer">
    <p>Dev by Dušan</p>
  </footer>

  <!-- ── Add Modal (bottom sheet) ── -->
  <div class="sheet-overlay" id="sheet-overlay">
    <div class="bottom-sheet" id="bottom-sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title">New Transaction</div>

      <div class="form-group">
        <label class="form-label">Description</label>
        <input class="form-input" id="f-desc" type="text" placeholder="e.g. Grocery run" autocomplete="off" />
      </div>

      <div class="form-group">
        <label class="form-label">Amount ($)</label>
        <input class="form-input form-amount" id="f-amount" type="number" placeholder="0.00" min="0" step="0.01" />
      </div>

      <div class="form-group">
        <label class="form-label">Category</label>
        <div class="cat-picker" id="cat-picker">
          <button class="cat-btn active" data-cat="Food">🍔 Food</button>
          <button class="cat-btn" data-cat="Transport">🚗 Transport</button>
          <button class="cat-btn" data-cat="Shopping">🛍 Shopping</button>
          <button class="cat-btn" data-cat="Health">💊 Health</button>
          <button class="cat-btn" data-cat="Entertainment">🎮 Fun</button>
          <button class="cat-btn" data-cat="Income">💰 Income</button>
          <button class="cat-btn" data-cat="Other">📦 Other</button>
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Date</label>
        <input class="form-input" id="f-date" type="date" />
      </div>

      <div class="form-group">
        <label class="form-label">Type</label>
        <div class="type-toggle">
          <button class="type-btn active" id="type-expense" data-type="expense">Expense</button>
          <button class="type-btn" id="type-income" data-type="income">Income</button>
        </div>
      </div>

      <button class="submit-btn" id="submit-btn">Add Transaction</button>
      <button class="cancel-btn" id="cancel-btn">Cancel</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
